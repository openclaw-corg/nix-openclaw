name: Publish Mirrored Release Tag

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-mirrored-release-tag
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      ${{
        github.repository == 'openclaw/nix-openclaw' &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main' &&
            contains(fromJSON('["push","workflow_dispatch"]'), github.event.workflow_run.event)
          )
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout proven main commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || 'main' }}

      - name: Publish mirrored release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_RUN_URL: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.html_url || '' }}
        run: |
          set -euo pipefail
          git config user.name "openclaw-ci"
          git config user.email "ci@openclaw.local"
          scripts/publish-release-tag.sh publish
